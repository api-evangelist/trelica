naftiko: 1.0.0-alpha2
info:
  label: Trelica REST API — Audit Log
  description: 'Trelica REST API — Audit Log. 1 operations. Lead operation: List Audit Logs. Self-contained Naftiko capability
    covering one Trelica business surface.'
  tags:
  - Trelica
  - Audit Log
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRELICA_API_KEY: TRELICA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-audit-log
    baseUri: https://app.trelica.com/api
    description: Trelica REST API — Audit Log business capability. Self-contained, no shared references.
    resources:
    - name: audit-v1
      path: /audit/v1
      operations:
      - name: listauditlogs
        method: GET
        description: List Audit Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since
          in: query
          type: string
          description: Return entries after this date/time
        - name: after
          in: query
          type: string
          description: Pagination cursor
        - name: limit
          in: query
          type: integer
          description: Maximum number of results (default 100)
    authentication:
      type: bearer
      token: '{{env.TRELICA_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-audit-log-rest
    port: 8080
    description: REST adapter for Trelica REST API — Audit Log. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/audit/v1
      name: audit-v1
      description: REST surface for audit-v1.
      operations:
      - method: GET
        name: listauditlogs
        description: List Audit Logs
        call: rest-audit-log.listauditlogs
        with:
          since: rest.since
          after: rest.after
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-audit-log-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trelica REST API — Audit Log. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-audit-logs
      description: List Audit Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-audit-log.listauditlogs
      with:
        since: tools.since
        after: tools.after
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
