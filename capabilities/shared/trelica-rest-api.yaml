naftiko: "1.0.0-alpha1"

info:
  label: "Trelica REST API"
  description: >-
    The Trelica REST API provides programmatic access to the SaaS management platform
    covering applications, users, people, contracts, workflows, assets, and audit logs.
    Trelica is now part of 1Password SaaS Manager.
  tags:
    - Contract Management
    - IT Management
    - License Management
    - SaaS Management
    - Software Asset Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TRELICA_ACCESS_TOKEN: TRELICA_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: trelica
      baseUri: https://app.trelica.com/api
      description: "Trelica SaaS management REST API"
      authentication:
        type: bearer
        token: "{{TRELICA_ACCESS_TOKEN}}"
      resources:
        - name: applications
          path: /apps/v1
          description: "SaaS applications tracked in Trelica"
          operations:
            - name: list-applications
              method: GET
              description: "List SaaS applications"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Free-text search"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results (default 100)"
                - name: since
                  in: query
                  type: string
                  required: false
                  description: "Filter by modification date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: application-detail
          path: /apps/v1/{appId}
          description: "Single SaaS application"
          operations:
            - name: get-application
              method: GET
              description: "Get application details"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "Application identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: application-users
          path: /apps/v1/{appId}/users
          description: "Users of a specific application"
          operations:
            - name: list-application-users
              method: GET
              description: "List users for a specific application"
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
                  description: "Application identifier"
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Free-text search"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results (default 100)"
                - name: since
                  in: query
                  type: string
                  required: false
                  description: "Filter by modification date"
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "SCIM-style filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: people
          path: /people/v1
          description: "People (employees) in the organization"
          operations:
            - name: list-people
              method: GET
              description: "List people in the organization"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Free-text search"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results (default 100)"
                - name: since
                  in: query
                  type: string
                  required: false
                  description: "Filter by modification date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-person
              method: POST
              description: "Create a new person record"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
                  email: "{{tools.email}}"
                  department: "{{tools.department}}"
                  jobTitle: "{{tools.jobTitle}}"
                  active: "{{tools.active}}"

        - name: person-detail
          path: /people/v1/{personId}
          description: "Single person record"
          operations:
            - name: get-person
              method: GET
              description: "Get person details"
              inputParameters:
                - name: personId
                  in: path
                  type: string
                  required: true
                  description: "Person identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-person
              method: PATCH
              description: "Update person record"
              inputParameters:
                - name: personId
                  in: path
                  type: string
                  required: true
                  description: "Person identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
                  email: "{{tools.email}}"
                  department: "{{tools.department}}"
                  jobTitle: "{{tools.jobTitle}}"
                  active: "{{tools.active}}"

        - name: contracts
          path: /contracts/v1
          description: "Software contracts managed in Trelica"
          operations:
            - name: list-contracts
              method: GET
              description: "List software contracts"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Free-text search"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results (default 100)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: contract-detail
          path: /contracts/v1/{contractId}
          description: "Single contract record"
          operations:
            - name: get-contract
              method: GET
              description: "Get contract details"
              inputParameters:
                - name: contractId
                  in: path
                  type: string
                  required: true
                  description: "Contract identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: workflows
          path: /workflows/v1
          description: "Automation workflows in Trelica"
          operations:
            - name: list-workflows
              method: GET
              description: "List automation workflows"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Free-text search"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results (default 100)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: assets
          path: /assets/v1
          description: "Software and hardware assets"
          operations:
            - name: list-assets
              method: GET
              description: "List assets"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Free-text search"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results (default 100)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: audit-log
          path: /audit/v1
          description: "Audit trail of all platform events"
          operations:
            - name: list-audit-logs
              method: GET
              description: "List audit log entries"
              inputParameters:
                - name: since
                  in: query
                  type: string
                  required: false
                  description: "Return entries after this date/time"
                - name: after
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results (default 100)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: scim-users
          path: /scim/v2/Users
          description: "User provisioning via SCIM 2.0"
          operations:
            - name: list-scim-users
              method: GET
              description: "List users using SCIM 2.0 protocol"
              inputParameters:
                - name: startIndex
                  in: query
                  type: integer
                  required: false
                  description: "1-based start index (default 1)"
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: "Max results (default 100)"
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "SCIM filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: trelica-rest-api
      resources:
        - path: /v1/applications
          name: applications
          description: "SaaS applications"
          operations:
            - method: GET
              name: list-applications
              description: "List SaaS applications"
              call: "trelica.list-applications"
              with:
                q: "rest.q"
                after: "rest.after"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/applications/{appId}
          name: application-detail
          description: "Application detail"
          operations:
            - method: GET
              name: get-application
              description: "Get application"
              call: "trelica.get-application"
              with:
                appId: "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/applications/{appId}/users
          name: application-users
          description: "Application users"
          operations:
            - method: GET
              name: list-application-users
              description: "List application users"
              call: "trelica.list-application-users"
              with:
                appId: "rest.appId"
                q: "rest.q"
                after: "rest.after"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/people
          name: people
          description: "People records"
          operations:
            - method: GET
              name: list-people
              description: "List people"
              call: "trelica.list-people"
              with:
                q: "rest.q"
                after: "rest.after"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-person
              description: "Create person"
              call: "trelica.create-person"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/people/{personId}
          name: person-detail
          description: "Person detail"
          operations:
            - method: GET
              name: get-person
              description: "Get person"
              call: "trelica.get-person"
              with:
                personId: "rest.personId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-person
              description: "Update person"
              call: "trelica.update-person"
              with:
                personId: "rest.personId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/contracts
          name: contracts
          description: "Software contracts"
          operations:
            - method: GET
              name: list-contracts
              description: "List contracts"
              call: "trelica.list-contracts"
              with:
                q: "rest.q"
                after: "rest.after"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/contracts/{contractId}
          name: contract-detail
          description: "Contract detail"
          operations:
            - method: GET
              name: get-contract
              description: "Get contract"
              call: "trelica.get-contract"
              with:
                contractId: "rest.contractId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workflows
          name: workflows
          description: "Automation workflows"
          operations:
            - method: GET
              name: list-workflows
              description: "List workflows"
              call: "trelica.list-workflows"
              with:
                q: "rest.q"
                after: "rest.after"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/assets
          name: assets
          description: "Assets"
          operations:
            - method: GET
              name: list-assets
              description: "List assets"
              call: "trelica.list-assets"
              with:
                q: "rest.q"
                after: "rest.after"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/audit-logs
          name: audit-logs
          description: "Audit log entries"
          operations:
            - method: GET
              name: list-audit-logs
              description: "List audit logs"
              call: "trelica.list-audit-logs"
              with:
                since: "rest.since"
                after: "rest.after"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: scim-users
          description: "Users via SCIM"
          operations:
            - method: GET
              name: list-scim-users
              description: "List users (SCIM)"
              call: "trelica.list-scim-users"
              with:
                startIndex: "rest.startIndex"
                count: "rest.count"
                filter: "rest.filter"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: trelica-mcp
      transport: http
      tools:
        - name: list-applications
          description: "List SaaS applications tracked in Trelica"
          hints:
            readOnly: true
            openWorld: true
          call: "trelica.list-applications"
          with:
            q: "tools.q"
            after: "tools.after"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-application
          description: "Get details for a specific SaaS application"
          hints:
            readOnly: true
            openWorld: false
          call: "trelica.get-application"
          with:
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-application-users
          description: "List users of a specific SaaS application"
          hints:
            readOnly: true
            openWorld: true
          call: "trelica.list-application-users"
          with:
            appId: "tools.appId"
            q: "tools.q"
            after: "tools.after"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-people
          description: "List people (employees) in the organization"
          hints:
            readOnly: true
            openWorld: true
          call: "trelica.list-people"
          with:
            q: "tools.q"
            after: "tools.after"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-person
          description: "Get details for a specific person"
          hints:
            readOnly: true
            openWorld: false
          call: "trelica.get-person"
          with:
            personId: "tools.personId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-person
          description: "Create a new person record in Trelica"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "trelica.create-person"
          with:
            displayName: "tools.displayName"
            email: "tools.email"
            department: "tools.department"
            jobTitle: "tools.jobTitle"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-person
          description: "Update a person record in Trelica"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "trelica.update-person"
          with:
            personId: "tools.personId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-contracts
          description: "List software contracts managed in Trelica"
          hints:
            readOnly: true
            openWorld: true
          call: "trelica.list-contracts"
          with:
            q: "tools.q"
            after: "tools.after"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-contract
          description: "Get details for a specific software contract"
          hints:
            readOnly: true
            openWorld: false
          call: "trelica.get-contract"
          with:
            contractId: "tools.contractId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-workflows
          description: "List automation workflows in Trelica"
          hints:
            readOnly: true
            openWorld: true
          call: "trelica.list-workflows"
          with:
            q: "tools.q"
            after: "tools.after"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-assets
          description: "List software and hardware assets tracked in Trelica"
          hints:
            readOnly: true
            openWorld: true
          call: "trelica.list-assets"
          with:
            q: "tools.q"
            after: "tools.after"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-audit-logs
          description: "List audit log entries for all platform changes and events"
          hints:
            readOnly: true
            openWorld: true
          call: "trelica.list-audit-logs"
          with:
            since: "tools.since"
            after: "tools.after"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List users via SCIM 2.0 protocol"
          hints:
            readOnly: true
            openWorld: true
          call: "trelica.list-scim-users"
          with:
            startIndex: "tools.startIndex"
            count: "tools.count"
            filter: "tools.filter"
          outputParameters:
            - type: object
              mapping: "$."
