apis:
  - aid: trelica:trelica
    name: Trelica REST API
    description: >-
      The Trelica REST API provides programmatic access to the core areas of the
      Trelica SaaS management platform, including applications, people,
      contracts, workflows, assets, audit logs, and user management. The API
      uses OAuth 2.0 with either Client Credentials (for integrations) or
      Authorization Code flow (for third-party developer apps). The Users
      endpoint follows the SCIM protocol.
    humanURL: https://trelica.gitbook.io/trelica-api
