aid: trelica
name: Trelica
description: >-
  Trelica is a SaaS management platform (now part of 1Password SaaS Manager)
  providing application discovery, license optimization, contract management,
  and workflow automation for IT teams. The platform offers a REST API covering
  applications, users, people, contracts, workflows, assets, and audit logs
  with OAuth 2.0 authentication using Client Credentials and Authorization Code
  flows.
type: Index
